version: "3.8"

services:
  dashboard:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.dashboard
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "3001:3001"
    env_file:
      - ../../.env
    restart: unless-stopped

# Nota: Supabase, n8n e Evolution API rodam separadamente no Easypanel.
# Este compose é apenas para dashboard + API.
